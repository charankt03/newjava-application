apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newjava-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/charankt03/newjava-application.git
    targetRevision: master
    path: git-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
